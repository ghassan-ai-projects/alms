# GitHub Actions CI for ALMS
#
# Runs on push/PR to main. Uses PostgreSQL service container so
# store-layer integration tests run (those t.Skip("PostgreSQL") tests
# become no-ops in CI without the service container).
#
# Pipeline: tidy → build → vet → lint → test (short) → deadcode → vulncheck
# Cross-compile linux binary at the end (to verify deploy.sh works).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25.11"

jobs:
  ci:
    name: "ALMS CI"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: alms
          POSTGRES_PASSWORD: alms
          POSTGRES_DB: alms_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"
          cache: true

      - name: Install dependencies
        run: |
          go install golang.org/x/tools/cmd/deadcode@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Tidy
        run: go mod tidy
        env:
          GOPROXY: https://proxy.golang.org,direct

      - name: Build
        run: go build -o /dev/null ./cmd/alms/

      - name: Vet
        run: go vet ./...

      - name: Lint
        run: golangci-lint run ./... --timeout=5m

      - name: Test (short)
        run: go test -short -race -count=1 -shuffle=on ./...
        env:
          ALMS_PG_DSN: "postgres://alms:alms@localhost:5432/alms_db?sslmode=disable"

      - name: Deadcode
        run: deadcode -test ./...

      - name: Vulncheck
        run: govulncheck ./...

      - name: Cross-compile linux binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-X main.Version=ci -X main.Commit=$(git rev-parse --short HEAD)" -o bin/alms-linux ./cmd/alms/
          echo "Linux binary size: $(ls -lh bin/alms-linux | awk '{print $5}')"

      - name: Upload linux binary (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: alms-linux-amd64
          path: bin/alms-linux
          retention-days: 3
