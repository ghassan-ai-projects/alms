version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: alms
      POSTGRES_PASSWORD: alms
      POSTGRES_DB: alms_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alms -d alms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
