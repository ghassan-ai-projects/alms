<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMS Dashboard</title>
    <style>
        :root {
            --bg: #0f1923;
            --card: #1a2a3a;
            --border: #2a3a4a;
            --text: #e0e0e0;
            --muted: #8899aa;
            --accent: #4fc3f7;
            --success: #66bb6a;
            --warn: #ffa726;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
        }
        h1 { font-size: 1.5rem; font-weight: 600; }
        .badge {
            display: inline-block; padding: 4px 12px; border-radius: 12px;
            font-size: 0.75rem; font-weight: 500; background: var(--card);
        }
        .badge.ok { background: var(--success); color: #000; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 8px;
            padding: 16px;
        }
        .stat-card h3 { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
        .stat-card .value { font-size: 2rem; font-weight: 700; }
        .section { margin-bottom: 24px; }
        .section h2 { font-size: 1.1rem; margin-bottom: 12px; color: var(--accent); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { color: var(--muted); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; }
        .status-indicator {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
        }
        .status-indicator.online { background: var(--success); }
        .status-indicator.offline { background: var(--warn); }
        button {
            background: var(--accent); color: #000; border: none; border-radius: 6px;
            padding: 8px 16px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-state { color: #ef5350; padding: 20px; text-align: center; }
        .loading { text-align: center; padding: 20px; color: var(--muted); }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🤖 ALMS Dashboard</h1>
        <div>
            <span class="badge ok" id="server-status">Connected</span>
            <button onclick="refresh()" id="refresh-btn" style="margin-left: 12px;">Refresh</button>
        </div>
    </header>

    <div class="stats" id="stats">
        <div class="stat-card">
            <h3>Agents</h3>
            <div class="value" id="agent-count">—</div>
        </div>
        <div class="stat-card">
            <h3>Learnings</h3>
            <div class="value" id="learning-count">—</div>
        </div>
        <div class="stat-card">
            <h3>Protocols</h3>
            <div class="value" id="protocol-count">—</div>
        </div>
        <div class="stat-card">
            <h3>Version</h3>
            <div class="value" id="version">—</div>
        </div>
    </div>

    <div class="section">
        <h2>Registered Agents</h2>
        <div id="agents-section">
            <div class="loading">Loading agents...</div>
        </div>
    </div>

    <div class="section">
        <h2>Recent Learnings</h2>
        <div id="learnings-section">
            <div class="loading">Loading learnings...</div>
        </div>
    </div>

    <div class="section">
        <h2>Recent Syncs</h2>
        <div id="syncs-section">
            <div class="loading">Loading sync data...</div>
        </div>
    </div>
</div>

<script>
async function callMCP(method, params) {
    const resp = await fetch('/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            jsonrpc: '2.0',
            id: 1,
            method: method,
            params: params || {}
        })
    });
    const body = await resp.json();
    if (body.error) throw new Error(body.error.message || 'RPC error');
    const result = body.result;
    if (result && result.content && result.content.length > 0) {
        return JSON.parse(result.content[0].text);
    }
    return null;
}

async function refresh() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = 'Loading...';

    try {
        // Fetch agents
        const agents = await callMCP('tools/call', {
            name: 'agent.list',
            arguments: {}
        });
        document.getElementById('agent-count').textContent = Array.isArray(agents) ? agents.length : 0;

        // Render agents table
        const agentsSection = document.getElementById('agents-section');
        if (Array.isArray(agents) && agents.length > 0) {
            let html = '<table><thead><tr><th>ID</th><th>Type</th><th>Status</th><th>Heartbeat</th></tr></thead><tbody>';
            agents.forEach(a => {
                const isOnline = a.last_heartbeat && (Date.now() - new Date(a.last_heartbeat).getTime() < 300000);
                html += `<tr>
                    <td>${a.agent_id}</td>
                    <td>${a.agent_type || '—'}</td>
                    <td><span class="status-indicator ${isOnline ? 'online' : 'offline'}"></span>${isOnline ? 'Online' : 'Offline'}</td>
                    <td>${a.last_heartbeat ? new Date(a.last_heartbeat).toLocaleString() : 'Never'}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            agentsSection.innerHTML = html;
        } else {
            agentsSection.innerHTML = '<p style="color: var(--muted);">No agents registered.</p>';
        }

        // Fetch learnings
        let learnings = [];
        try {
            learnings = await callMCP('tools/call', {
                name: 'learning.search',
                arguments: { query: '', limit: 20 }
            });
        } catch (e) {
            // If search fails, try fetching via resource
            const resp = await fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    jsonrpc: '2.0',
                    id: 2,
                    method: 'resources/read',
                    params: { uri: 'alms://learnings' }
                })
            });
            const body = await resp.json();
            if (body.result && body.result.contents && body.result.contents.length > 0) {
                learnings = JSON.parse(body.result.contents[0].text);
            }
        }
        const learningCount = Array.isArray(learnings) ? learnings.length : 0;
        document.getElementById('learning-count').textContent = learningCount;

        const learningsSection = document.getElementById('learnings-section');
        if (Array.isArray(learnings) && learnings.length > 0) {
            let html = '<table><thead><tr><th>Title</th><th>Type</th><th>Score</th><th>Created</th></tr></thead><tbody>';
            learnings.slice(0, 10).forEach(l => {
                html += `<tr>
                    <td>${l.title || '—'}</td>
                    <td>${l.type || '—'}</td>
                    <td>${l.score != null ? l.score.toFixed(2) : '—'}</td>
                    <td>${l.created_at ? new Date(l.created_at).toLocaleString() : '—'}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            learningsSection.innerHTML = html;
        } else {
            learningsSection.innerHTML = '<p style="color: var(--muted);">No learnings recorded.</p>';
        }

        // Fetch sync data from health check
        const health = await callMCP('tools/call', {
            name: 'health.check',
            arguments: {}
        });
        document.getElementById('version').textContent = health.version || '—';

        // Fetch protocols count
        let protocols = [];
        try {
            protocols = await callMCP('tools/call', {
                name: 'protocol.list',
                arguments: {}
            });
        } catch (e) {
            // ignore
        }
        document.getElementById('protocol-count').textContent = Array.isArray(protocols) ? protocols.length : 0;

        // Render sync info
        const syncsSection = document.getElementById('syncs-section');
        if (Array.isArray(agents) && agents.length > 0) {
            let html = '<table><thead><tr><th>Agent</th><th>Last Sync</th><th>Last Heartbeat</th></tr></thead><tbody>';
            const recentAgents = agents.slice(0, 10).filter(a => a.last_sync_at || a.last_heartbeat);
            recentAgents.forEach(a => {
                html += `<tr>
                    <td>${a.agent_id}</td>
                    <td>${a.last_sync_at ? new Date(a.last_sync_at).toLocaleString() : 'Never'}</td>
                    <td>${a.last_heartbeat ? new Date(a.last_heartbeat).toLocaleString() : 'Never'}</td>
                </tr>`;
            });
            if (recentAgents.length === 0) {
                html += '<tr><td colspan="3" style="color: var(--muted); text-align: center;">No sync data yet.</td></tr>';
            }
            html += '</tbody></table>';
            syncsSection.innerHTML = html;
        } else {
            syncsSection.innerHTML = '<p style="color: var(--muted);">No sync data available.</p>';
        }
    } catch (err) {
        document.getElementById('server-status').className = 'badge';
        document.getElementById('server-status').textContent = 'Error: ' + err.message;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Refresh';
    }
}

// Initial load
refresh();
</script>
</body>
</html>
